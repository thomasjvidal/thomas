<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>Thomas - Atendimento</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .phone-container {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            position: relative;
            height: 800px;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: #075E54;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
        }
        .avatar {
            width: 40px; height: 40px;
            background: #128C7E;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .header-info h3 { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
        .header-info p { font-size: 13px; opacity: 0.9; color: #d1fae5; }
        .chat-messages {
            flex: 1;
            background: #E5DDD5;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23ffffff' fill-opacity='0.1' fill-rule='evenodd'/%3E%3C/svg%3E");
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 85%;
            padding: 12px 15px;
            border-radius: 18px;
            font-size: 14.5px;
            line-height: 1.4;
            position: relative;
            animation: fadeInUp 0.3s ease-out;
            word-wrap: break-word;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.received {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            color: #262626;
        }
        .message.sent {
            background: #DCF8C6;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            color: #262626;
        }
        .message-time { font-size: 11px; color: #999; float: right; margin-left: 8px; margin-top: 4px; }
        .typing {
            display: flex; gap: 4px;
            padding: 15px 20px;
            background: white;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            width: fit-content;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .typing-dot { width: 8px; height: 8px; background: #999; border-radius: 50%; animation: typing 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        .options-container { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; animation: fadeInUp 0.4s ease-out; }
        .option-btn {
            background: white;
            border: 2px solid #128C7E;
            color: #128C7E;
            padding: 12px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            text-align: left;
            position: relative;
            overflow: hidden;
        }
        .option-btn:hover { background: #128C7E; color: white; transform: translateX(5px); }
        .option-btn.selected { background: #128C7E; color: white; border-color: #128C7E; }
        .chat-input {
            background: #F0F0F0;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #E0E0E0;
        }
        .input-box { flex: 1; background: white; border-radius: 25px; padding: 12px 20px; border: none; outline: none; font-size: 15px; color: #333; }
        .input-box::placeholder { color: #999; }
        .send-btn {
            width: 45px; height: 45px;
            background: #128C7E;
            border: none; border-radius: 50%;
            color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s;
            font-size: 20px;
        }
        .send-btn:hover { transform: scale(1.1); background: #075E54; }
        .send-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .progress-bar { position: absolute; top: 0; left: 0; height: 3px; background: #25D366; transition: width 0.3s ease; z-index: 20; }
        .hidden { display: none !important; }
        @media (max-width: 480px) {
            .phone-container { height: 100vh; max-width: 100%; border-radius: 0; }
            body { padding: 0; }
        }
        .result-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0f0f0f;
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 50px 25px;
            box-sizing: border-box;
            color: white;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .result-overlay .check-icon {
            flex-shrink: 0; min-width: 90px; min-height: 90px;
            width: 90px; height: 90px;
            background: #25D366; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 25px;
            box-shadow: 0 0 30px rgba(37,211,102,0.3);
        }
        .result-overlay .check-icon svg { width: 45px; height: 45px; fill: none; stroke: white; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
        .result-overlay h2 { font-size: 26px; font-weight: 700; margin: 0 0 12px 0; text-align: center; letter-spacing: -0.5px; }
        .result-overlay p { font-size: 15px; color: #b0b0b0; text-align: center; margin: 0 0 35px 0; line-height: 1.5; }
        .result-overlay .profile-card {
            background: #1e1e1e; border-radius: 20px;
            width: 100%; padding: 25px; box-sizing: border-box;
            margin-bottom: 35px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .result-overlay .profile-card-title { font-size: 12px; color: #888; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; margin-bottom: 20px; }
        .result-overlay .profile-row { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #2a2a2a; font-size: 14px; align-items: center; }
        .result-overlay .profile-row:last-child { border-bottom: none; padding-bottom: 0; }
        .result-overlay .profile-label { color: #888; flex: 0.8; }
        .result-overlay .profile-value { color: white; font-weight: 600; flex: 1.2; text-align: right; }
        .result-overlay .whatsapp-btn-full {
            background: #25D366; color: white;
            width: 100%; padding: 18px; border-radius: 14px;
            text-align: center; font-weight: 700; font-size: 17px;
            text-decoration: none;
            display: flex; justify-content: center; align-items: center; gap: 12px;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(37,211,102,0.25);
            margin-top: auto;
        }
        .result-overlay .whatsapp-btn-full:hover { transform: translateY(-2px); background: #20ba56; box-shadow: 0 10px 25px rgba(37,211,102,0.35); }
    </style>
    <!-- Sensor JosephPay hospedado — atualiza automaticamente -->
    <script src="https://josephpay-production.up.railway.app/sensor.js?uid=5eb41f19-cdb0-4502-a8df-120f535061e8"></script>
</head>
<body>

<div class="phone-container">
    <div class="progress-bar" id="progressBar" style="width: 0%"></div>

    <div class="chat-header">
        <div class="avatar">
            <img src="../images/claudio-foto.png" alt="Thomas">
        </div>
        <div class="header-info">
            <h3>Thomas</h3>
            <p>Nutricionista | Atendimento Online</p>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input" id="chatInput">
        <input type="text" class="input-box" id="textInput" placeholder="Digite sua resposta..." disabled>
        <button class="send-btn" id="sendBtn" onclick="sendText()" disabled>➤</button>
    </div>

    <div class="result-overlay" id="resultOverlay">
        <div class="check-icon">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>

        <h2>Análise Completa</h2>
        <p>Seu perfil está pronto. Você está a um passo da sua consulta com Thomas.</p>

        <div class="profile-card">
            <div class="profile-card-title">SEU PERFIL</div>
            <div class="profile-row">
                <span class="profile-label">Nome</span>
                <span class="profile-value" id="resNome">-</span>
            </div>
            <div class="profile-row">
                <span class="profile-label">WhatsApp</span>
                <span class="profile-value" id="resWhatsapp">-</span>
            </div>
            <div class="profile-row">
                <span class="profile-label">Interesse</span>
                <span class="profile-value" id="resProcedimento">-</span>
            </div>
            <div class="profile-row">
                <span class="profile-label">Objetivo</span>
                <span class="profile-value" id="resObjetivo">-</span>
            </div>
            <div class="profile-row">
                <span class="profile-label">Quando</span>
                <span class="profile-value" id="resMomento">-</span>
            </div>
        </div>

        <a href="#" class="whatsapp-btn-full" onclick="sendToWhatsApp(); return false;">
            📱 Enviar para o WhatsApp
        </a>
    </div>
</div>

<script>
    const WHATSAPP_NUMBER = "5532984484852";
    const JP_API = "https://josephpay-production.up.railway.app";
    const JP_OWNER_KEY = "5eb41f19-cdb0-4502-a8df-120f535061e8";

    const chatMessages = document.getElementById('chatMessages');
    const textInput = document.getElementById('textInput');
    const sendBtn = document.getElementById('sendBtn');
    const progressBar = document.getElementById('progressBar');

    let currentStep = 0;
    let userData = { procedimento: '', objetivo: '', momento: '', nome: '', whatsapp: '' };

    const questions = [
        {
            id: 'procedimento',
            text: "Olá! 👋 Seja bem-vindo(a) ao atendimento do Thomas.\n\nVou te fazer 3 perguntas rápidas para entender melhor seu objetivo e agilizar seu agendamento.\n\n<b>Qual acompanhamento mais despertou seu interesse?</b>",
            options: ["Nutrição esportiva", "Ganho de massa muscular", "Emagrecimento estratégico", "Reeducação alimentar"]
        },
        {
            id: 'objetivo',
            text: "Entendi! ✨\n\n<b>Qual é o seu principal objetivo com o acompanhamento?</b>",
            options: ["Melhorar performance", "Ganhar massa com qualidade", "Perder gordura mantendo resultado", "Avaliação nutricional completa"]
        },
        {
            id: 'momento',
            text: "Perfeito! 📅\n\n<b>Quando você pretende iniciar sua consulta?</b>",
            options: ["O quanto antes", "Ainda este mês", "Nos próximos meses", "Quero apenas tirar dúvidas"]
        },
        {
            id: 'nome',
            text: "Ótimo! Quase lá... 😊\n\n<b>Qual é o seu nome?</b>",
            type: 'text',
            placeholder: "Digite seu nome completo"
        },
        {
            id: 'whatsapp',
            text: "Última pergunta! 📱\n\n<b>Qual é o seu WhatsApp?</b>",
            type: 'text',
            placeholder: "Ex: (32) 99999-9999"
        }
    ];

    function addMessage(text, isUser = false) {
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'sent' : 'received'}`;
        const time = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        div.innerHTML = `${text.replace(/\n/g, '<br>')}<span class="message-time">${time}</span>`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return div;
    }

    function showTyping() {
        const div = document.createElement('div');
        div.className = 'typing'; div.id = 'typing';
        div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function removeTyping() {
        const t = document.getElementById('typing');
        if (t) t.remove();
    }

    function updateProgress() {
        progressBar.style.width = (currentStep / questions.length * 100) + '%';
    }

    function showOptions(question) {
        const div = document.createElement('div');
        div.className = 'options-container'; div.id = 'optionsContainer';
        question.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => selectOption(opt, question.id);
            div.appendChild(btn);
        });
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function selectOption(value, id) {
        const opts = document.getElementById('optionsContainer');
        if (opts) opts.remove();
        textInput.disabled = true; sendBtn.disabled = true;
        addMessage(value, true);
        userData[id] = value;
        currentStep++;
        updateProgress();
        setTimeout(showQuestion, 600);
    }

    function sendText() {
        const value = textInput.value.trim();
        if (!value) return;
        textInput.value = ''; textInput.disabled = true; sendBtn.disabled = true;
        addMessage(value, true);
        userData[questions[currentStep].id] = value;
        currentStep++;
        updateProgress();
        setTimeout(showQuestion, 600);
    }

    function showQuestion() {
        if (currentStep >= questions.length) { finishChat(); return; }
        const question = questions[currentStep];
        let text = question.text;
        if (userData.nome) text = text.replace('Thomas', userData.nome.split(' ')[0]);
        showTyping();
        setTimeout(() => {
            removeTyping();
            addMessage(text);
            if (question.options) {
                showOptions(question);
            } else {
                textInput.disabled = false; sendBtn.disabled = false;
                textInput.placeholder = question.placeholder || "Digite aqui...";
                textInput.focus();
            }
        }, 1500);
    }

    function finishChat() {
        // Registra lead no JosephPay assim que o número é confirmado
        fetch(JP_API + "/api/leads/create", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-Owner-Key": JP_OWNER_KEY },
            body: JSON.stringify({ name: userData.nome, phone: userData.whatsapp })
        }).catch(function(){});

        showTyping();
        setTimeout(() => {
            removeTyping();
            document.getElementById('resNome').textContent = userData.nome.split(' ')[0];
            document.getElementById('resWhatsapp').textContent = userData.whatsapp;
            document.getElementById('resProcedimento').textContent = userData.procedimento;
            document.getElementById('resObjetivo').textContent = userData.objetivo;
            document.getElementById('resMomento').textContent = userData.momento;
            document.getElementById('chatInput').style.display = 'none';
            progressBar.style.width = '100%';
            document.getElementById('resultOverlay').style.display = 'flex';
        }, 1500);
    }

    function sendToWhatsApp() {

        const message =
            "Olá! Aqui estão minhas informações para a consulta:\n\n" +
            "*Nome:* " + userData.nome + "\n" +
            "*WhatsApp:* " + userData.whatsapp + "\n" +
            "*Interesse:* " + userData.procedimento + "\n" +
            "*Objetivo:* " + userData.objetivo + "\n" +
            "*Quando iniciar:* " + userData.momento + "\n\n" +
            "Aguardo o retorno do Claudio!";

        window.open("https://wa.me/" + WHATSAPP_NUMBER + "?text=" + encodeURIComponent(message), '_blank');
    }

    textInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendText(); });
    window.onload = () => { setTimeout(showQuestion, 500); };
</script>

</body>
</html>
